{% extends "base.html" %}

{% block content %}

<h2>Set New Password</h2>

{% if validlink %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">
        Reset Password
    </button>
</form>

{% else %}

<p>
This password reset link is invalid or has expired.
</p>

{% endif %}

{% endblock %}
